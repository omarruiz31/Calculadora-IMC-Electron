<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Calculadora IMC</title>
</head>

<body>
  <header class="header">
    <div class="app">Calculadora IMC</div>
    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="historial.html">Historial</a>
    </nav>
  </header>

  <h1 class="title">Calculadora de Indice de Masa Corporal</h1>
  <form class="box">
    <div class="field">
      <label for="altura">Altura en cm</label>
      <input type="number" id="altura" placeholder="Ej 170..">
    </div>
    <div class="field">
      <label for="peso">Peso en kg</label><input type="number" id="peso" placeholder="Ej 65">
    </div>

    <button type="submit" class="calcular">Calcular IMC</button>
  </form>

</body>
<script src="js/renderer.js"></script>

</html>
